<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>INNOV | 신청 내역 관리</title>
<meta name="robots" content="noindex, nofollow">

<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@500;600;700&display=swap" rel="stylesheet">

<style>
  :root {
    --dark: #133a22; --lavender: #caa9fc; --lavender-2: #b891f9;
    --lavender-soft: #e7d7ff; --mint: #dceee3; --cream: #f9f7ec;
    --gray: #767676; --border: #e6e6e6; --warn: #c0392b;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Pretendard', sans-serif;
    background: #f4f1e6;
    color: #222;
    line-height: 1.6;
    padding: 32px 24px;
  }
  .admin-wrap { max-width: 1280px; margin: 0 auto; }

  header {
    background: var(--dark);
    color: #fff;
    border-radius: 18px;
    padding: 28px 32px;
    margin-bottom: 24px;
  }
  header .eyebrow { font-family: 'Caveat', cursive; font-size: 22px; color: var(--lavender); }
  header h1 { font-size: 24px; font-weight: 900; margin: 4px 0 8px; letter-spacing: -0.02em; }
  header p { font-size: 13px; color: rgba(255,255,255,0.75); line-height: 1.7; }
  header p strong { color: #fff; }

  .toolbar {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    margin-bottom: 20px;
    align-items: center;
  }
  .toolbar .count {
    font-size: 13px; color: var(--gray); margin-right: auto;
  }
  .toolbar .count strong { color: var(--dark); font-size: 16px; }
  .btn {
    padding: 9px 16px;
    background: #fff;
    color: var(--dark);
    border: 1.5px solid var(--border);
    border-radius: 999px;
    font-size: 13px; font-weight: 700;
    cursor: pointer;
    transition: all 0.15s;
    font-family: inherit;
  }
  .btn:hover { border-color: var(--dark); background: var(--dark); color: #fff; }
  .btn.danger { color: var(--warn); border-color: var(--warn); }
  .btn.danger:hover { background: var(--warn); color: #fff; }

  .empty {
    background: #fff;
    padding: 60px 30px;
    border-radius: 18px;
    text-align: center;
    color: var(--gray);
  }
  .empty h3 { font-size: 18px; color: var(--dark); margin-bottom: 8px; }
  .empty p { font-size: 13px; line-height: 1.7; }

  .card {
    background: #fff;
    border-radius: 16px;
    padding: 24px 28px;
    margin-bottom: 14px;
    box-shadow: 0 2px 10px rgba(19, 58, 34, 0.05);
    position: relative;
  }
  .card-head {
    display: flex; justify-content: space-between; align-items: baseline;
    margin-bottom: 16px;
    padding-bottom: 12px;
    border-bottom: 1px dashed var(--border);
    flex-wrap: wrap; gap: 8px;
  }
  .card-name { font-size: 18px; font-weight: 900; color: var(--dark); }
  .card-time { font-size: 12px; color: var(--gray); }
  .card-program {
    display: inline-block;
    margin-left: 10px;
    padding: 3px 10px;
    background: var(--lavender-soft);
    color: var(--dark);
    border-radius: 999px;
    font-size: 11px; font-weight: 700;
  }
  .card-grid {
    display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 10px 24px;
    font-size: 13.5px;
  }
  .card-grid dt {
    font-size: 11px; font-weight: 800;
    color: var(--lavender-2);
    letter-spacing: 0.06em; text-transform: uppercase;
    margin-bottom: 2px;
  }
  .card-grid dd {
    color: #333; word-break: break-word;
  }
  .card-block { margin-top: 14px; }
  .card-block dt {
    font-size: 11px; font-weight: 800;
    color: var(--lavender-2);
    letter-spacing: 0.06em; text-transform: uppercase;
    margin-bottom: 4px;
  }
  .card-block dd {
    background: var(--cream);
    padding: 10px 12px;
    border-radius: 8px;
    font-size: 13px;
    white-space: pre-wrap;
    word-break: keep-all;
  }
  .card-delete {
    position: absolute;
    top: 18px; right: 22px;
    background: none; border: none;
    font-size: 12px;
    color: var(--gray);
    cursor: pointer;
    text-decoration: underline;
  }
  .card-delete:hover { color: var(--warn); }

  .info-box {
    background: #fffbe6;
    border-left: 4px solid #f0b400;
    padding: 16px 20px;
    border-radius: 10px;
    margin-bottom: 20px;
    font-size: 13px;
    color: #5a4500;
    line-height: 1.7;
  }
  .info-box strong { color: var(--dark); }
</style>
</head>
<body>

<div class="admin-wrap">

  <header>
    <div class="eyebrow">admin</div>
    <h1>신청 내역 관리</h1>
    <p>로컬 브라우저에 저장된 INNOV 신청 내역입니다. <strong>이 브라우저에서 접수된 데이터만 보입니다.</strong></p>
  </header>

  <div class="info-box">
    ✅ <strong>자동 이메일 전송 활성화됨:</strong> 모든 신청 / 문의는 <strong>innov.storytelling@gmail.com</strong>으로 자동 발송됩니다 (FormSubmit.co AJAX). 이 페이지는 추가로 <strong>현재 브라우저</strong>의 localStorage에도 백업된 사본을 보여줍니다.
    <br>📥 메인 데이터는 받은편지함을 확인하시고, 백업/통계 용도로는 CSV 내보내기를 이용하세요.
  </div>

  <div class="toolbar">
    <div class="count">총 <strong id="totalCount">0</strong>건</div>
    <button class="btn" onclick="exportCSV()">📥 CSV 내보내기</button>
    <button class="btn" onclick="exportJSON()">📥 JSON 내보내기</button>
    <button class="btn danger" onclick="clearAll()">🗑 전체 삭제</button>
  </div>

  <div id="submissions"></div>
</div>

<script>
const APP_KEY = 'innov_applications_v1';
const INQ_KEY = 'innov_inquiries_v1';

const PROGRAM_LABEL = {
  'insight-test': 'INSIGHT TEST', 'insight-step1': 'INSIGHT STEP 1',
  'insight-step2': 'INSIGHT STEP 2', 'insight-step3': 'INSIGHT STEP 3',
  'rebuild': 'INNOV REBUILD', 'etc': '기타'
};

function loadKey(key) {
  try { return JSON.parse(localStorage.getItem(key) || '[]'); }
  catch { return []; }
}
function saveKey(key, arr) { localStorage.setItem(key, JSON.stringify(arr)); }

function escape(str) {
  return String(str || '').replace(/[<>&]/g, c => ({ '<': '&lt;', '>': '&gt;', '&': '&amp;' }[c]));
}

function renderApplicationCard(s, origIdx) {
  const programLabel = PROGRAM_LABEL[s.program] || s.program || '-';
  return `
    <div class="card">
      <button class="card-delete" onclick="removeApp(${origIdx})">× 삭제</button>
      <div class="card-head">
        <div>
          <span class="card-name">${escape(s.name)}</span>
          <span class="card-program" style="background:#dceee3;">🌱 신청</span>
          <span class="card-program">${escape(programLabel)}</span>
        </div>
        <div class="card-time">${escape(s.timestamp_kr || s.timestamp)}</div>
      </div>
      <dl class="card-grid">
        <div><dt>성별</dt><dd>${escape(s.gender)}</dd></div>
        <div><dt>생년월일</dt><dd>${escape(s.birthdate)}</dd></div>
        <div><dt>연락처</dt><dd>${escape(s.phone)}</dd></div>
        <div><dt>이메일</dt><dd>${escape(s.email)}</dd></div>
        <div><dt>거주지</dt><dd>${escape(s.residence)}</dd></div>
        <div><dt>카카오톡 ID</dt><dd>${escape(s.kakao) || '<i style="color:#aaa">미입력</i>'}</dd></div>
        <div><dt>연락 가능 시간</dt><dd>${escape(s.callTime) || '<i style="color:#aaa">미입력</i>'}</dd></div>
        <div><dt>개인정보 동의</dt><dd>${s.consent ? '✅ 동의' : '❌ 미동의'}</dd></div>
      </dl>
      <div class="card-block">
        <dt>상담 신청동기 (목적)</dt>
        <dd>${escape(s.motivation)}</dd>
      </div>
      ${s.notes ? '<div class="card-block"><dt>문의사항</dt><dd>' + escape(s.notes) + '</dd></div>' : ''}
    </div>
  `;
}

function renderInquiryCard(s, origIdx) {
  const programLabel = PROGRAM_LABEL[s.program] || s.program || '미선택';
  return `
    <div class="card" style="border-left: 4px solid var(--lavender);">
      <button class="card-delete" onclick="removeInq(${origIdx})">× 삭제</button>
      <div class="card-head">
        <div>
          <span class="card-name">${escape(s.name)}</span>
          <span class="card-program" style="background:#e7d7ff;">💬 문의</span>
          ${s.program ? '<span class="card-program">' + escape(programLabel) + '</span>' : ''}
        </div>
        <div class="card-time">${escape(s.timestamp_kr || s.timestamp)}</div>
      </div>
      <dl class="card-grid">
        <div><dt>이메일</dt><dd>${escape(s.email)}</dd></div>
        <div><dt>연락처</dt><dd>${escape(s.phone) || '<i style="color:#aaa">미입력</i>'}</dd></div>
      </dl>
      <div class="card-block">
        <dt>문의 내용</dt>
        <dd>${escape(s.message)}</dd>
      </div>
    </div>
  `;
}

function render() {
  const apps = loadKey(APP_KEY);
  const inqs = loadKey(INQ_KEY);
  const total = apps.length + inqs.length;
  document.getElementById('totalCount').textContent = total;

  const container = document.getElementById('submissions');
  if (total === 0) {
    container.innerHTML = '<div class="empty"><h3>아직 접수된 내역이 없습니다</h3><p>신청 / 문의가 들어오면 이곳에 자동으로 표시됩니다.</p></div>';
    return;
  }

  // 모두 합쳐서 시간순 정렬
  const combined = [
    ...apps.map((s, i) => ({ type: 'app', data: s, origIdx: i })),
    ...inqs.map((s, i) => ({ type: 'inq', data: s, origIdx: i }))
  ].sort((a, b) => (b.data.timestamp || '').localeCompare(a.data.timestamp || ''));

  container.innerHTML = combined.map(item =>
    item.type === 'app'
      ? renderApplicationCard(item.data, item.origIdx)
      : renderInquiryCard(item.data, item.origIdx)
  ).join('');
}

function removeApp(idx) {
  if (!confirm('이 신청 내역을 삭제하시겠습니까?')) return;
  const data = loadKey(APP_KEY);
  data.splice(idx, 1);
  saveKey(APP_KEY, data);
  render();
}
function removeInq(idx) {
  if (!confirm('이 문의 내역을 삭제하시겠습니까?')) return;
  const data = loadKey(INQ_KEY);
  data.splice(idx, 1);
  saveKey(INQ_KEY, data);
  render();
}

function clearAll() {
  if (!confirm('모든 신청 및 문의 내역을 삭제하시겠습니까? 되돌릴 수 없습니다.')) return;
  localStorage.removeItem(APP_KEY);
  localStorage.removeItem(INQ_KEY);
  render();
}

function exportJSON() {
  const data = { applications: loadKey(APP_KEY), inquiries: loadKey(INQ_KEY) };
  if (!data.applications.length && !data.inquiries.length) { alert('내보낼 데이터가 없습니다.'); return; }
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  downloadBlob(blob, 'innov-data.json');
}

function exportCSV() {
  const apps = loadKey(APP_KEY);
  const inqs = loadKey(INQ_KEY);
  if (!apps.length && !inqs.length) { alert('내보낼 데이터가 없습니다.'); return; }
  const headers = ['구분', '접수일시', '이름', '성별', '생년월일', '거주지', '연락처', '이메일', '프로그램', '신청동기/문의내용', '카카오톡ID', '연락가능시간', '추가문의', '개인정보동의'];
  const appRows = apps.map(s => [
    '신청', s.timestamp_kr || s.timestamp, s.name, s.gender, s.birthdate, s.residence,
    s.phone, s.email, PROGRAM_LABEL[s.program] || s.program,
    s.motivation, s.kakao || '', s.callTime || '', s.notes || '',
    s.consent ? '동의' : '미동의'
  ]);
  const inqRows = inqs.map(s => [
    '문의', s.timestamp_kr || s.timestamp, s.name, '', '', '',
    s.phone || '', s.email, PROGRAM_LABEL[s.program] || s.program || '미선택',
    s.message, '', '', '', ''
  ]);
  const csv = [headers, ...appRows, ...inqRows]
    .map(row => row.map(cell => '"' + String(cell || '').replace(/"/g, '""') + '"').join(','))
    .join('\n');
  const blob = new Blob(['﻿' + csv], { type: 'text/csv;charset=utf-8' });
  downloadBlob(blob, 'innov-data.csv');
}

function downloadBlob(blob, filename) {
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename;
  a.click();
  setTimeout(() => URL.revokeObjectURL(url), 1000);
}

render();
window.addEventListener('storage', e => {
  if (e.key === APP_KEY || e.key === INQ_KEY) render();
});
</script>

</body>
</html>
