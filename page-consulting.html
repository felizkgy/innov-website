<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>INNOV 상담 신청서</title>

<!-- Open Graph / Twitter Card -->
<meta property="og:type" content="website">
<meta property="og:site_name" content="INNOV">
<meta property="og:title" content="INNOV 상담 신청서">
<meta property="og:description" content="상담 신청서를 작성하시면 2영업일 이내 담당 상담사가 직접 연락드립니다.">
<meta property="og:url" content="https://innov-me.co.kr/page-consulting.html">
<meta property="og:image" content="https://innov-me.co.kr/og-image.png">
<meta property="og:image:width" content="1200">
<meta property="og:image:height" content="630">
<meta property="og:locale" content="ko_KR">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="INNOV 상담 신청서">
<meta name="twitter:description" content="상담 신청서를 작성하시면 2영업일 이내 담당 상담사가 직접 연락드립니다.">
<meta name="twitter:image" content="https://innov-me.co.kr/og-image.png">
<meta name="description" content="상담 신청서를 작성하시면 2영업일 이내 담당 상담사가 직접 연락드립니다.">

<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<link rel="stylesheet" href="shared.css">
<style>
:root{--dark:#133a22;--dark-2:#0d2917;--lavender:#caa9fc;--lavender-2:#b891f9;--lavender-soft:#e7d7ff;--mint:#dceee3;--cream:#f9f7ec;--white:#ffffff;--charcoal:#222222;--gray:#767676;--border:#e6e6e6;--radius:16px;--radius-lg:24px;--shadow:0 4px 24px rgba(19,58,34,0.06);--shadow-lg:0 12px 40px rgba(19,58,34,0.1);}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Pretendard','Noto Sans KR',sans-serif;background:var(--cream);color:var(--charcoal);line-height:1.7;font-size:16px;letter-spacing:-0.01em;-webkit-font-smoothing:antialiased;}
a{color:inherit;text-decoration:none;}
.innov-section{padding:clamp(60px,10vw,100px) 24px;}
.innov-container{max-width:760px;margin:0 auto;}

.hero{background:var(--cream);text-align:center;padding:clamp(80px,12vw,120px) 24px 60px;position:relative;overflow:hidden;}
.hero::before{content:'';position:absolute;top:-10%;right:-5%;width:360px;height:360px;background:var(--lavender);border-radius:50%;filter:blur(100px);opacity:.28;pointer-events:none;}
.hero::after{content:'';position:absolute;bottom:-15%;left:-5%;width:360px;height:360px;background:var(--mint);border-radius:50%;filter:blur(90px);opacity:.6;pointer-events:none;}
.hero-overline{display:inline-block;font-size:12px;color:var(--lavender-2);margin-bottom:14px;font-weight:700;letter-spacing:.2em;text-transform:uppercase;}
.hero h1{font-size:clamp(28px,5vw,44px);font-weight:900;color:var(--dark);letter-spacing:-0.02em;line-height:1.3;margin-bottom:16px;position:relative;z-index:2;}
.hero h1 em{font-style:normal;position:relative;display:inline-block;}
.hero h1 em::after{content:'';position:absolute;left:-4px;right:-4px;bottom:4px;height:14px;background:var(--lavender-soft);z-index:-1;border-radius:4px;}
.hero-sub{font-size:clamp(15px,2vw,17px);color:var(--gray);line-height:1.8;position:relative;z-index:2;}

.product-info{background:var(--white);border-radius:var(--radius-lg);padding:28px 32px;box-shadow:var(--shadow);border-left:4px solid var(--lavender);margin-bottom:32px;}
.product-info-label{font-size:12px;color:var(--lavender-2);font-weight:700;letter-spacing:.15em;text-transform:uppercase;margin-bottom:8px;}
.product-info-name{font-size:22px;font-weight:900;color:var(--dark);margin-bottom:4px;}
.product-info-price{font-size:15px;color:var(--gray);font-weight:600;}

.form-card{background:var(--white);border-radius:var(--radius-lg);padding:40px 36px;box-shadow:var(--shadow);}
.form-card h2{font-size:20px;font-weight:900;color:var(--dark);margin-bottom:6px;}
.form-card .form-sub{font-size:14px;color:var(--gray);margin-bottom:28px;line-height:1.7;}
.field{margin-bottom:18px;}
.field label{display:block;font-size:13px;font-weight:700;color:var(--dark);margin-bottom:6px;}
.field label .req{color:var(--lavender-2);margin-left:2px;}
.field input,.field select,.field textarea{width:100%;padding:12px 14px;border:1.5px solid var(--border);border-radius:10px;font-family:inherit;font-size:14px;color:var(--charcoal);background:var(--cream);transition:border .2s;}
.field input:focus,.field select:focus,.field textarea:focus{outline:none;border-color:var(--lavender-2);background:var(--white);}
.field textarea{resize:vertical;min-height:110px;}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
.field-check{display:flex;align-items:flex-start;gap:10px;font-size:13px;color:var(--gray);margin:20px 0 24px;}
.field-check input{width:16px;height:16px;margin-top:2px;flex-shrink:0;accent-color:var(--lavender-2);}
.field-check a{color:var(--dark);text-decoration:underline;}
.btn-submit{display:flex;width:100%;align-items:center;justify-content:center;padding:16px 28px;background:var(--dark);color:#fff;border:none;border-radius:999px;font-size:15px;font-weight:700;cursor:pointer;transition:background .2s,transform .2s;font-family:inherit;gap:8px;}
.btn-submit::after{content:'→';font-size:18px;transition:transform .2s;}
.btn-submit:hover{background:var(--dark-2);transform:translateY(-2px);}
.btn-submit:hover::after{transform:translateX(4px);}

.success{display:none;text-align:center;padding:60px 32px;}
.success-icon{width:72px;height:72px;background:var(--lavender-soft);border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 24px;font-size:32px;}
.success h2{font-size:24px;font-weight:900;color:var(--dark);margin-bottom:12px;}
.success p{color:var(--gray);line-height:1.8;margin-bottom:28px;}
.back-link{display:inline-flex;align-items:center;gap:6px;padding:12px 24px;background:var(--lavender);color:var(--dark);border-radius:999px;font-size:14px;font-weight:700;transition:background .2s;}
.back-link:hover{background:var(--lavender-2);}

@media(max-width:600px){
  .hero{padding:80px 18px 48px;}
  .form-card{padding:28px 20px;}
  .product-info{padding:22px 20px;}
  .field-row{grid-template-columns:1fr;}
}
</style>
</head>
<body>

<nav class="innov-nav" id="innovNav">
  <div class="innov-nav-inner">
    <a href="index.html" class="innov-nav-logo">
      <img src="symbol.png" alt="innov 심볼" class="innov-nav-symbol" />
      <img src="logo-innov.png" alt="innov" class="innov-nav-wordmark" onerror="this.outerHTML=&apos;<span class=\&apos;brand-script\&apos;>innov</span>&apos;" />
    </a>
    <ul class="innov-nav-menu" id="innovMenu">
      <li><a href="index.html">HOME</a></li>
      <li><a href="page-about.html">ABOUT</a></li>
      <li><a href="page-counselors.html">COACH</a></li>
      <li><a href="page-programs.html">PROGRAM</a></li>
      <li><a href="page-apply.html" class="active">APPLY</a></li>
    </ul>
    <a href="page-apply.html" class="innov-nav-cta">상담 신청</a>
    <button class="innov-nav-toggle" id="innovToggle" aria-label="메뉴 열기">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round">
        <line x1="3" y1="6" x2="21" y2="6"/>
        <line x1="3" y1="12" x2="21" y2="12"/>
        <line x1="3" y1="18" x2="21" y2="18"/>
      </svg>
    </button>
  </div>
</nav>

<section class="hero">
  <div class="innov-container">
    <span class="hero-overline">consultation apply</span>
    <h1>상담 신청서<br><em>작성하기</em></h1>
    <p class="hero-sub">정보를 입력해주시면 2영업일 이내<br>담당 상담사가 직접 연락드립니다.</p>
  </div>
</section>

<section class="innov-section">
  <div class="innov-container">
    <div class="product-info" id="product-info" style="display:none;">
      <div class="product-info-label">선택한 프로그램</div>
      <div class="product-info-name" id="product-name">—</div>
      <div class="product-info-price" id="product-price"></div>
    </div>

    <div class="form-card" id="form-wrap">
      <h2>신청 정보 입력</h2>
      <p class="form-sub">모든 정보는 상담 매칭을 위해서만 사용되며,<br>외부에 공유되지 않습니다.</p>

      <form id="consult-form" onsubmit="handleSubmit(event)">
        <div class="field-row">
          <div class="field">
            <label for="c-name">이름 <span class="req">*</span></label>
            <input type="text" id="c-name" required placeholder="홍길동">
          </div>
          <div class="field">
            <label for="c-age">나이 <span class="req">*</span></label>
            <input type="number" id="c-age" required min="18" max="60" placeholder="27">
          </div>
        </div>
        <div class="field">
          <label for="c-email">이메일 <span class="req">*</span></label>
          <input type="email" id="c-email" required placeholder="you@example.com">
        </div>
        <div class="field">
          <label for="c-phone">연락처 <span class="req">*</span></label>
          <input type="tel" id="c-phone" required placeholder="010-0000-0000">
        </div>
        <div class="field">
          <label for="c-program">신청 프로그램 <span class="req">*</span></label>
          <select id="c-program" required>
            <option value="">선택해주세요</option>
            <option value="insight-test">REFRAME · TEST 검사 (30,000원)</option>
            <option value="insight-step1">REFRAME · STEP 1 (200,000원)</option>
            <option value="insight-step2">REFRAME · STEP 2 (400,000원)</option>
            <option value="insight-step3">REFRAME · STEP 3 전 과정 (600,000원)</option>
            <option value="rebuild">INNOV BUILD-UP (50,000원)</option>
          </select>
        </div>
        <div class="field">
          <label for="c-mode">상담 방식</label>
          <select id="c-mode">
            <option value="online">비대면 (Zoom)</option>
            <option value="offline">대면 (서울)</option>
          </select>
        </div>
        <div class="field">
          <label for="c-concern">현재 가장 힘든 점 <span class="req">*</span></label>
          <textarea id="c-concern" required placeholder="어떤 어려움을 겪고 계신지 편하게 적어주세요. 상담사 매칭에 활용됩니다."></textarea>
        </div>
        <div class="field">
          <label for="c-time">선호 상담 시간대</label>
          <select id="c-time">
            <option value="">무관</option>
            <option value="morning">오전 (10:00–12:00)</option>
            <option value="afternoon">오후 (13:00–17:00)</option>
            <option value="evening">저녁 (18:00–20:00)</option>
            <option value="weekend">주말</option>
          </select>
        </div>
        <label class="field-check">
          <input type="checkbox" required>
          <span><a href="#">개인정보 수집·이용</a>에 동의합니다. 상담 신청을 위해 이름·연락처·이메일이 수집되며, 상담 종료 후 1년간 보관됩니다. <span class="req">*</span></span>
        </label>
        <button type="submit" class="btn-submit">신청서 제출하기</button>
      </form>

      <div class="success" id="success-msg">
        <div class="success-icon">✓</div>
        <h2>신청이 완료되었습니다!</h2>
        <p>입력하신 이메일로 확인 안내가 발송됩니다.<br>2영업일 이내 담당 상담사가 연락드릴게요.</p>
        <a href="index.html" class="back-link">← 홈으로 돌아가기</a>
      </div>
    </div>
  </div>
</section>

<script>
(function(){
  // Nav
  var t=document.getElementById('innovToggle');
  var m=document.getElementById('innovMenu');
  var n=document.getElementById('innovNav');
  if(t&&m){t.addEventListener('click',function(){m.classList.toggle('open');});}
  document.addEventListener('click',function(e){if(m&&t&&!m.contains(e.target)&&!t.contains(e.target)){m.classList.remove('open');}});
  window.addEventListener('scroll',function(){if(n){n.classList.toggle('scrolled',window.scrollY>10);}},{ passive:true });

  // Product from URL
  var PRODUCTS={
    'insight-test':{name:'REFRAME TEST 검사',price:'30,000원'},
    'insight-step1':{name:'REFRAME STEP 1',price:'200,000원'},
    'insight-step2':{name:'REFRAME STEP 2',price:'400,000원'},
    'insight-step3':{name:'REFRAME STEP 3 (전 과정)',price:'600,000원'},
    'rebuild':{name:'INNOV BUILD-UP',price:'50,000원'}
  };
  var params=new URLSearchParams(window.location.search);
  var pid=params.get('product');
  if(pid&&PRODUCTS[pid]){
    var info=document.getElementById('product-info');
    info.style.display='block';
    document.getElementById('product-name').textContent=PRODUCTS[pid].name;
    document.getElementById('product-price').textContent=PRODUCTS[pid].price;
    var sel=document.getElementById('c-program');
    for(var i=0;i<sel.options.length;i++){if(sel.options[i].value===pid){sel.options[i].selected=true;break;}}
  }
})();

function handleSubmit(e){
  e.preventDefault();
  document.getElementById('consult-form').style.display='none';
  document.getElementById('success-msg').style.display='block';
  document.getElementById('product-info').style.display='none';
}
</script>
</body>
</html>
